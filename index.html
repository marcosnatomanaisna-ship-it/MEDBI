<title>Examen Físico · Semiología</title>
<style>
  :root {
    --bg:        #F7FAF8;
    --surface:   #FFFFFF;
    --border:    #D4E8DC;
    --green-900: #0D3D26;
    --green-700: #166534;
    --green-500: #22C55E;
    --green-200: #BBF7D0;
    --green-50:  #F0FDF4;
    --text-main: #0F172A;
    --text-mute: #475569;
    --text-light:#94A3B8;
    --accent:    #16A34A;
    --radius:    10px;
    --shadow:    0 1px 4px rgba(0,0,0,.07);
    --safe-top:  env(safe-area-inset-top, 0px);
    --safe-bot:  env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    /* Support iOS safe areas */
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  /* ── INSTALL BANNER ── */
  #installBanner {
    display: none;
    background: var(--green-900);
    color: #fff;
    padding: 10px 16px;
    align-items: center;
    gap: 10px;
    font-size: .8rem;
    z-index: 500;
    flex-shrink: 0;
  }
  #installBanner.show { display: flex; }
  #installBanner span { flex: 1; }
  #installBanner button {
    background: var(--green-500);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: .78rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  #installClose {
    background: none !important;
    padding: 4px 8px !important;
    opacity: .6;
    font-size: 1rem !important;
  }

  /* ── TOP BAR ── */
  header {
    background: var(--green-900);
    color: #fff;
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  header svg { flex-shrink: 0; }
  header h1 {
    font-size: .9rem;
    font-weight: 700;
    line-height: 1.2;
    flex: 1;
    min-width: 0;
  }
  header h1 span {
    font-size: .68rem;
    color: var(--green-200);
    font-weight: 400;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .badge {
    background: var(--green-700);
    color: var(--green-200);
    font-size: .65rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: .04em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── MENU TOGGLE (mobile) ── */
  #menuBtn {
    display: none;
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── SIDEBAR ── */
  nav {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0 24px;
    flex-shrink: 0;
    transition: transform .25s ease;
  }
  .nav-title {
    font-size: .6rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-light);
    padding: 0 14px 10px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: .8rem;
    color: var(--text-mute);
    border-left: 3px solid transparent;
    transition: background .15s, border-color .15s, color .15s;
    line-height: 1.3;
    user-select: none;
  }
  .nav-item:hover { background: var(--green-50); color: var(--green-700); }
  .nav-item.active {
    background: var(--green-50);
    border-left-color: var(--accent);
    color: var(--green-700);
    font-weight: 600;
  }
  .nav-num {
    min-width: 22px; height: 22px;
    background: var(--green-200);
    color: var(--green-700);
    border-radius: 50%;
    font-size: .65rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .nav-item.active .nav-num { background: var(--accent); color: #fff; }

  /* ── MAIN CONTENT ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 40px;
    min-width: 0;
  }

  /* ── SECTION CARD ── */
  .section-card { display: none; animation: fadeIn .2s ease; }
  .section-card.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .section-icon {
    width: 40px; height: 40px;
    background: var(--green-200);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.2rem;
  }
  .section-header h2 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--green-900);
    line-height: 1.25;
  }
  .section-header p {
    font-size: .7rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  .content-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: .83rem;
    line-height: 1.75;
    color: var(--text-main);
    box-shadow: var(--shadow);
  }
  .content-block b { color: var(--green-700); }

  /* ── ACCORDION ── */
  .accordion { display: flex; flex-direction: column; gap: 7px; }
  .acc-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: border-color .2s;
  }
  .acc-item.open { border-color: var(--green-500); }
  .acc-trigger {
    width: 100%;
    background: none;
    border: none;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    text-align: left;
    transition: background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .acc-trigger:hover, .acc-item.open .acc-trigger { background: var(--green-50); }
  .acc-trigger-label {
    flex: 1;
    font-size: .84rem;
    font-weight: 600;
    color: var(--green-900);
    line-height: 1.3;
  }
  .acc-chevron {
    width: 17px; height: 17px;
    color: var(--text-light);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .acc-item.open .acc-chevron { transform: rotate(180deg); color: var(--accent); }
  .acc-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .acc-item.open .acc-dot { background: var(--accent); }
  .acc-body {
    display: none;
    padding: 14px 16px 15px;
    font-size: .82rem;
    line-height: 1.78;
    color: var(--text-main);
    border-top: 1px solid var(--border);
  }
  .acc-item.open .acc-body { display: block; }
  .acc-body b { color: var(--green-700); }

  .sub-group { margin-top: 14px; }
  .sub-group:first-child { margin-top: 0; }
  .sub-title {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 5px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--green-200);
  }

  .field {
    display: inline-block;
    background: #FFFBEB;
    border: 1px dashed #F59E0B;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: .78rem;
    color: #92400E;
    font-style: italic;
  }

  /* ── SCROLL TOP ── */
  #topBtn {
    position: fixed;
    bottom: calc(20px + var(--safe-bot));
    right: 20px;
    width: 40px; height: 40px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(0,0,0,.25);
    z-index: 200;
    font-size: 1rem;
    -webkit-tap-highlight-color: transparent;
  }
  #topBtn.show { display: flex; }

  /* ── OVERLAY (mobile nav) ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 300;
  }
  #overlay.show { display: block; }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    #menuBtn { display: flex; }
    nav {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 260px;
      z-index: 400;
      padding-top: calc(12px + var(--safe-top));
      transform: translateX(-100%);
      box-shadow: none;
    }

<div class="sub-group"><div class="sub-title">Par X — N. Vago</div>Examen del velo del paladar y la úvula normales. Reflejo faríngeo presente. Reflejos del seno carotídeo y oculocardíaco no explorados.</div>
<div class="sub-group"><div class="sub-title">Par XI — N. Accesorio</div>No se observan asimetrías en cuello y nuca. Tono y fuerza de esternocleidomastoideos y trapecios conservados.</div>
<div class="sub-group"><div class="sub-title">Par XII — N. Hipogloso</div>A la inspección de la lengua no se observan atrofias ni desviaciones.</div>
` },
    ]
  },
];

// ── RENDER NAV ──────────────────────────────────────────────────────
const nav = document.getElementById('mainNav');
SECTIONS.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'nav-item' + (i === 0 ? ' active' : '');
  el.dataset.target = s.id;
  el.innerHTML = `<span class="nav-num">${s.num}</span>${s.title}`;
  el.addEventListener('click', () => { showSection(s.id); closeNav(); });
  nav.appendChild(el);
});

// ── RENDER SECTIONS ─────────────────────────────────────────────────
const mainEl = document.getElementById('mainContent');
SECTIONS.forEach(s => {
  const card = document.createElement('div');
  card.className = 'section-card' + (s.id === 's0' ? ' visible' : '');
  card.id = s.id;

  let body = '';
  if (s.direct) {
    body = `<div class="content-block">${s.direct}</div>`;
  } else if (s.subsections) {
    body = `<div class="accordion">`;
    s.subsections.forEach((sub, idx) => {
      const uid = `${s.id}-acc${idx}`;
      body += `
      <div class="acc-item" id="${uid}">
        <button class="acc-trigger" onclick="toggleAcc('${uid}')">
          <span class="acc-dot"></span>
          <span class="acc-trigger-label">${sub.title}</span>
          <svg class="acc-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="acc-body">${sub.body}</div>
      </div>`;
    });
    body += `</div>`;
  }

  card.innerHTML = `
    <div class="section-header">
      <div class="section-icon">${s.icon}</div>
      <div>
        <h2>${s.num}. ${s.title}</h2>
        <p>${s.sub}</p>
      </div>
    </div>
    ${body}`;
  mainEl.appendChild(card);
});

// ── NAVIGATION ──────────────────────────────────────────────────────
function showSection(id) {
  document.querySelectorAll('.section-card').forEach(c => c.classList.remove('visible'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(id)?.classList.add('visible');
  document.querySelector(`[data-target="${id}"]`)?.classList.add('active');
  mainEl.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── ACCORDION ───────────────────────────────────────────────────────
function toggleAcc(uid) {
  const item = document.getElementById(uid);
  const isOpen = item.classList.contains('open');
  item.closest('.accordion').querySelectorAll('.acc-item').forEach(a => a.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

document.querySelectorAll('.accordion').forEach(acc => {
  const first = acc.querySelector('.acc-item');
  if (first) first.classList.add('open');
});

// ── SCROLL TOP ──────────────────────────────────────────────────────
const topBtn = document.getElementById('topBtn');
mainEl.addEventListener('scroll', () => {
  topBtn.classList.toggle('show', mainEl.scrollTop > 180);
});
topBtn.addEventListener('click', () => mainEl.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
</body>
</html>
